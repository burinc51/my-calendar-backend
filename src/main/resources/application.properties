# ============================================================
# Application Config
# ============================================================
spring.application.name=My Calendar App
server.port=${PORT:9001}
server.allowed-origins=${SERVER_ALLOWED_ORIGINS}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.path.file.upload=${FILE_UPLOAD_PATH}
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${JPA_DDL}
spring.jpa.show-sql=${JPA_SHOW_SQL}
spring.jackson.time-zone=Asia/Bangkok
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
# ============================================================
# Flyway Configuration
# ============================================================
spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Bangkok
# ============================================================
# Actuator Config
# ============================================================
management.endpoints.web.exposure.include=health,info
# ============================================================
# Swagger Config
# ============================================================
springdoc.swagger-ui.csrf.enabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.syntaxHighlight.activated=true
springdoc.show-login-endpoint=true
# ============================================================
# Mail Config
# ============================================================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
# ============================================================
# Jwt
# ============================================================
app.jwt.secret=${JWT_SECRET}
app.access.token.expiration.milliseconds=${ACCESS_TOKEN_EXPIRATION}
app.refresh.token.expiration.milliseconds=${REFRESH_TOKEN_EXPIRATION}
# ============================================================
# Google APi
# ============================================================
app.google.client-id=${GOOGLE_CLIENT_ID}
# ============================================================
# Quartz Scheduler (Push Notification)
# ============================================================
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.threadPool.threadCount=5